<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>קל נופש · ניהול</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Suez+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="adm">

  <aside class="adm__side">
    <div class="adm__brand">
      <svg class="brand__mark" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="48" fill="none" stroke="#EBE0C8" stroke-width="3"/>
        <circle cx="50" cy="54" r="20" fill="#E6AC36"/>
        <path d="M14 76 L40 76 M60 76 L86 76" stroke="#1E7A78" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span>
        <span class="adm__brand-name">קל נופש</span>
        <span class="adm__brand-sub">ניהול</span>
      </span>
    </div>

    <nav class="adm__nav" aria-label="ניווט ניהול">
      <button data-section="dashboard" class="active">לוח בקרה</button>
      <button data-section="properties">מתחמים</button>
      <button data-section="lists">הגדרת שדות</button>
      <button data-section="users">מנהלים</button>
      <button data-section="settings">הגדרות</button>
    </nav>

    <div class="adm__side-foot">
      <span id="currentUserLabel" style="font-size:.8rem"></span>
      <a href="../index.html" target="_blank">צפייה באתר ←</a>
      <button id="logoutBtn" type="button">יציאה</button>
    </div>
  </aside>

  <main class="adm__main">

    <!-- ============ Dashboard ============ -->
    <section class="adm-section active" data-section="dashboard">
      <div class="adm-head">
        <h1>לוח בקרה</h1>
      </div>

      <div class="adm-stats" id="statsHost"></div>

      <div class="adm-form">
        <h2 style="font-family:var(--font-display); font-size:1.5rem; margin-bottom:1rem">פעולות מהירות</h2>
        <div style="display:flex; gap:0.6rem; flex-wrap:wrap">
          <button class="btn" type="button" data-quick="add-property">הוספת מתחם ←</button>
          <button class="btn btn--ghost" type="button" data-quick="lists">הגדרת שדות</button>
          <button class="btn btn--ghost" type="button" data-quick="users">ניהול מנהלים</button>
          <button class="btn btn--ghost" type="button" data-quick="settings">הגדרות</button>
        </div>
      </div>
    </section>

    <!-- ============ Properties ============ -->
    <section class="adm-section" data-section="properties">
      <div class="adm-head">
        <h1 id="propsTitle">ניהול מתחמים</h1>
        <div>
          <button class="btn" id="addPropBtn">הוספת מתחם <span class="arr">←</span></button>
        </div>
      </div>

      <div class="adm-filters">
        <input class="input" type="text" id="propSearch" placeholder="חיפוש לפי שם..." />
        <select class="select" id="propStatusFilter">
          <option value="">כל הסטטוסים</option>
          <option value="published">מפורסמת</option>
          <option value="draft">טיוטה</option>
        </select>
      </div>

      <div id="propsHost"></div>
    </section>

    <!-- ============ Lists / Field definitions ============ -->
    <section class="adm-section" data-section="lists">
      <div class="adm-head">
        <h1>הגדרת שדות</h1>
      </div>
      <div class="lists-grid" id="listsHost"></div>
    </section>

    <!-- ============ Users (NEW) ============ -->
    <section class="adm-section" data-section="users">
      <div class="adm-head">
        <h1>ניהול מנהלים</h1>
      </div>
      <div id="usersHost"></div>
    </section>

    <!-- ============ Settings ============ -->
    <section class="adm-section" data-section="settings">
      <div class="adm-head">
        <h1>הגדרות כלליות</h1>
      </div>
      <div id="settingsHost"></div>
    </section>

  </main>
</div>

<script src="../js/content/copy.he.js"></script>
<script src="../js/data/static-data.js"></script>
<script src="../js/data/local-store.js"></script>
<script src="../js/data/api.js"></script>
<script src="../js/lib/ui.js"></script>
<script src="../js/lib/whatsapp.js"></script>
<script src="../js/lib/dates.js"></script>
<script src="../js/lib/listing.js"></script>
<script src="../js/admin/state.js"></script>
<script src="../js/admin/properties.js"></script>
<script src="../js/admin/lists.js"></script>
<script src="../js/admin/users.js"></script>
<script src="../js/admin/settings.js"></script>
<script src="../js/admin/dashboard.js"></script>
</body>
</html>
