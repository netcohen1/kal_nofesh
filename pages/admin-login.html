<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>קל נופש · אזור מפרסם</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Suez+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<main class="login-shell">
  <div class="login-card">
    <div class="brand">
      <svg class="brand__mark" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="48" fill="none" stroke="#23211B" stroke-width="3"/>
        <circle cx="50" cy="54" r="20" fill="#E6AC36"/>
        <g stroke="#23211B" stroke-width="3" stroke-linecap="round">
          <line x1="50" y1="14" x2="50" y2="24"/>
          <line x1="24" y1="24" x2="31" y2="31"/>
          <line x1="76" y1="24" x2="69" y2="31"/>
          <line x1="14" y1="54" x2="24" y2="54"/>
          <line x1="86" y1="54" x2="76" y2="54"/>
        </g>
        <path d="M14 76 L40 76 M60 76 L86 76" stroke="#1E7A78" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span>
        <span class="brand__name">קל נופש</span>
        <span class="brand__sub">אזור מפרסם</span>
      </span>
    </div>

    <h1 id="loginTitle">התחברות</h1>
    <p id="loginIntro">הכניסו פרטי כניסה. אם אתם המנהל הראשי, השאירו את שדה שם המשתמש ריק.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username" class="field-label">שם משתמש (לא חובה למנהל הראשי)</label>
        <input class="input" type="text" id="username" name="username" autocomplete="username" placeholder="admin" />
      </div>
      <div class="field">
        <label for="password" class="field-label">סיסמה</label>
        <input class="input" type="password" id="password" name="password" autocomplete="current-password" required />
        <span class="field-error hidden" id="loginError">סיסמה שגויה.</span>
      </div>
      <button class="btn btn--block" type="submit" id="loginBtn">כניסה</button>
    </form>

    <p class="login-back">
      <a href="../index.html">→ חזרה לאתר</a>
    </p>
  </div>
</main>

<script src="../js/content/copy.he.js"></script>
<script src="../js/data/local-store.js"></script>
<script src="../js/data/api.js"></script>
<script src="../js/lib/ui.js"></script>
<script src="../js/admin/login.js"></script>
</body>
</html>
