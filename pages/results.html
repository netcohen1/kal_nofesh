<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>קל נופש · תוצאות חיפוש</title>
<meta name="description" content="תוצאות חיפוש מתחמי נופש לפי סוג, אזור, עיר, תאריכים ומחיר." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Suez+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<a href="#results" class="skip-link">דלג לתוצאות</a>

<div class="strip">
  <div class="wrap strip__row">
    <span></span>
    <a href="admin-login.html" class="strip__admin" aria-label="כניסת מפרסם" title="כניסת מפרסם">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path fill="currentColor" d="M12 1a5 5 0 0 0-5 5v4H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm-3 9V6a3 3 0 1 1 6 0v4H9z"/>
      </svg>
    </a>
  </div>
</div>

<header class="head">
  <div class="wrap head__row">
    <a class="brand" href="../index.html" aria-label="קל נופש – לעמוד הבית">
      <svg class="brand__mark" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="48" fill="none" stroke="#23211B" stroke-width="3"/>
        <circle cx="50" cy="54" r="20" fill="#E6AC36"/>
        <g stroke="#23211B" stroke-width="3" stroke-linecap="round">
          <line x1="50" y1="14" x2="50" y2="24"/>
          <line x1="24" y1="24" x2="31" y2="31"/>
          <line x1="76" y1="24" x2="69" y2="31"/>
        </g>
        <path d="M14 76 L40 76 M60 76 L86 76" stroke="#1E7A78" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span>
        <span class="brand__name">קל נופש</span>
        <span class="brand__sub">מתחמי נופש · ישראל</span>
      </span>
    </a>

    <nav class="nav" id="nav" aria-label="ניווט ראשי">
      <a class="tlink" href="../index.html">דף הבית</a>
      <a class="tlink" href="../index.html#by-region">לפי אזור</a>
      <a class="tlink" href="../index.html#publish">פרסום מתחם</a>
    </nav>

    <button class="burger" id="burger" aria-label="תפריט" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main id="main">

<section class="hero" style="padding-bottom:0">
  <div class="wrap">
    <p class="eyebrow">חיפוש</p>
    <h1 style="font-size:clamp(2rem,4.5vw,3.2rem); margin-bottom:1.4rem">תוצאות חיפוש</h1>

    <form class="name-search" id="nameSearchForm" autocomplete="off" style="margin-top:0">
      <input type="text" id="q" placeholder="חיפוש מהיר לפי שם המתחם..." aria-label="חיפוש לפי שם המתחם" />
      <button type="submit" id="nameSearchSubmit">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/>
        </svg>
        חיפוש
      </button>
    </form>

    <p class="search-sep"><span>חיפוש מתקדם</span></p>

    <form class="search" id="searchForm" autocomplete="off" style="margin-top:0">
      <div class="search__body">
        <div class="search__field search__field--date" data-area="dates">
          <div class="date-head">
            <label id="dateModeLabel">תאריך כניסה - תאריך יציאה</label>
            <button type="button" class="date-toggle" id="dateModeToggle">אפשר גם לבחור תאריך גמיש (לפי חודש)</button>
          </div>
          <div id="dateExactWrap" class="date-pair">
            <div class="date-cell">
              <span class="date-cell__lbl">כניסה</span>
              <input type="date" id="dateFrom" />
            </div>
            <div class="date-cell">
              <span class="date-cell__lbl">יציאה</span>
              <input type="date" id="dateTo" />
            </div>
          </div>
          <div id="dateFlexWrap" hidden>
            <span class="month-grid-help">לחצו על חודשים שבהם אתם פנויים. ניתן לבחור מספר חודשים.</span>
            <div class="month-grid" id="monthGrid"></div>
            <input type="hidden" id="flexMonths" name="flexMonths" />
          </div>
          <input type="hidden" id="dateMode" name="dateMode" value="exact" />
        </div>

        <div class="search__field" data-area="type">
          <label>סוג נכס</label>
          <div id="typeMS"></div>
          <input type="hidden" id="type" name="type" />
        </div>

        <div class="search__field" data-area="location">
          <div class="loc-head">
            <span class="loc-toggle" id="locToggle">
              <button type="button" data-loc="region" class="active">לפי אזור</button>
              <button type="button" data-loc="city">לפי עיר</button>
            </span>
          </div>
          <div id="regionMS"></div>
          <div id="cityMS" hidden></div>
          <input type="hidden" id="region" name="region" />
          <input type="hidden" id="city" name="city" />
        </div>

        <div class="search__field" data-area="guests">
          <label for="guests">כמות אורחים</label>
          <input type="number" id="guests" name="guests" placeholder="לדוגמה: 12" min="1" max="500" inputmode="numeric" />
        </div>

        <div class="search__field" data-area="price">
          <label>מחיר ללילה</label>
          <div class="range">
            <input type="number" id="priceMin" name="priceMin" placeholder="מ-" min="0" inputmode="numeric" />
            <span class="sep">–</span>
            <input type="number" id="priceMax" name="priceMax" placeholder="עד" min="0" inputmode="numeric" />
          </div>
        </div>

        <button class="search__go" type="submit" id="searchSubmit" data-area="submit">עדכון <span class="arr">←</span></button>
      </div>
    </form>
  </div>
</section>

<section class="homes" id="results">
  <div class="wrap">
    <div class="results-toolbar">
      <span class="count" id="count"></span>
      <div class="sort">
        <label for="sort">מיון:</label>
        <select id="sort">
          <option value="featured">לפי מומלצים</option>
          <option value="newest">לפי חדשים</option>
          <option value="price_asc">לפי מחיר עולה</option>
          <option value="price_desc">לפי מחיר יורד</option>
        </select>
      </div>
    </div>
    <div id="grid" class="home-grid" aria-live="polite"></div>
  </div>
</section>

</main>

<footer class="foot foot--minimal">
  <div class="wrap foot__row">
    <span style="font-size:.85rem">© 2026 קל נופש</span>
  </div>
</footer>

<script src="../js/content/copy.he.js"></script>
<script src="../js/data/static-data.js"></script>
<script src="../js/data/local-store.js"></script>
<script src="../js/data/api.js"></script>
<script src="../js/lib/ui.js"></script>
<script src="../js/lib/whatsapp.js"></script>
<script src="../js/lib/dates.js"></script>
<script src="../js/lib/multiselect.js"></script>
<script src="../js/lib/listing.js"></script>
<script src="../js/results.js"></script>
</body>
</html>
